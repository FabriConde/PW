<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Libros</title>
</head>
<body>
        <h2>Actualizar datos</h2>

        <form id="formularioBuscar" method="GET" action="procesar_libro.php">
            <label for="isbn">ISBN:</label>
            <input type="text" id="isbn" name="isbn" required>

            <button type="submit">Buscar Libro</button>     
        </form>

        <h2>Insertar Nuevo Libro</h2>
        
        <form id="formularioLibro" method="POST" action="procesar_libro.php">
            <label for="isbn">ISBN:</label>
            <input type="text" id="isbn" name="isbn" required>
        
            <label for="titulo">Título:</label>
            <input type="text" id="titulo" name="titulo" required>        
        
            <label for="autor">Autor:</label>
            <input type="text" id="autor" name="autor" required>
        
        
            <label for="editorial">Editorial:</label>
            <input type="text" id="editorial" name="editorial" required>

            <label for="numPaginas">Número de Páginas:</label>
            <input type="number" id="numPaginas" name="numPaginas" required>
        
            <label for="anio">Año de Publicación:</label>
            <input type="number" id="anio" name="anio" required>

            <button type="submit">Insertar Libro</button>           
        </form>
</body>
</html>
